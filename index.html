<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>FamsssPay Notice</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e334d;
  --blue: #4f8ef7;
  --blue-dim: rgba(79,142,247,0.12);
  --red: #f75f5f;
  --red-dim: rgba(247,95,95,0.12);
  --green: #4fca8e;
  --green-dim: rgba(79,202,142,0.12);
  --amber: #f7c44f;
  --amber-dim: rgba(247,196,79,0.1);
  --text: #e8eaf6;
  --muted: #6b7280;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; padding: 32px 16px; }
.layout { max-width: 960px; margin: 0 auto; display: grid; grid-template-columns: 380px 1fr; gap: 24px; align-items: start; }
.header { grid-column: 1/-1; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.header-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
.header span { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-left: auto; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px; }
.card-title { font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); margin-bottom: 18px; }

label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; margin-top: 16px; }
label:first-of-type { margin-top: 0; }
select, input, textarea {
  width: 100%; padding: 10px 13px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; font-size: 13px; color: var(--text);
  font-family: var(--sans); outline: none; transition: border-color 0.15s;
}
select:focus, input:focus, textarea:focus { border-color: var(--blue); }
textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
select option { background: var(--surface2); }

.btn-row { display: flex; gap: 10px; margin-top: 18px; }
.btn {
  flex: 1; padding: 11px; border: none; border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: var(--sans); transition: opacity 0.15s, transform 0.1s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn:hover { opacity: 0.85; }
.btn:active { transform: scale(0.98); }
.btn-send { background: var(--blue); color: #fff; }
.btn-hapus { background: var(--red); color: #fff; }

.status-bar {
  margin-top: 14px; font-size: 12px; padding: 10px 13px;
  border-radius: 8px; display: none; font-family: var(--mono);
  line-height: 1.5;
}
.status-bar.ok { background: var(--green-dim); color: var(--green); border: 1px solid rgba(79,202,142,0.2); display: block; }
.status-bar.err { background: var(--red-dim); color: var(--red); border: 1px solid rgba(247,95,95,0.2); display: block; }

/* History */
.history-panel { display: flex; flex-direction: column; gap: 0; }
.history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.history-title { font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); }
.clear-btn { font-size: 11px; color: var(--muted); background: none; border: none; cursor: pointer; font-family: var(--sans); padding: 3px 8px; border-radius: 5px; transition: background 0.15s; }
.clear-btn:hover { background: var(--surface2); color: var(--text); }

.history-list { display: flex; flex-direction: column; gap: 8px; max-height: 520px; overflow-y: auto; padding-right: 4px; }
.history-list::-webkit-scrollbar { width: 4px; }
.history-list::-webkit-scrollbar-track { background: transparent; }
.history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.history-item {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 13px 15px;
  animation: slideIn 0.2s ease;
}
@keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

.hi-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.hi-badge {
  font-size: 10px; font-weight: 600; padding: 3px 8px;
  border-radius: 5px; font-family: var(--mono); letter-spacing: 0.5px;
}
.badge-send { background: var(--blue-dim); color: var(--blue); }
.badge-hapus { background: var(--red-dim); color: var(--red); }
.badge-ok { background: var(--green-dim); color: var(--green); }
.badge-fail { background: var(--red-dim); color: var(--red); }

.hi-time { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-left: auto; }
.hi-target { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
.hi-target span { color: var(--amber); font-family: var(--mono); }
.hi-msg { font-size: 13px; color: var(--text); line-height: 1.5; word-break: break-word; }
.hi-msg.hapus-msg { color: var(--muted); font-style: italic; }

.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
.empty-icon { font-size: 28px; margin-bottom: 10px; opacity: 0.4; }

.stat-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 18px; }
.stat { background: var(--surface2); border-radius: 8px; padding: 12px; text-align: center; }
.stat-num { font-family: var(--mono); font-size: 20px; font-weight: 600; }
.stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.5px; }
.stat-num.blue { color: var(--blue); }
.stat-num.green { color: var(--green); }
.stat-num.red { color: var(--red); }
</style>
</head>
<body>

<div class="layout">
  <div class="header">
    <div class="header-dot"></div>
    <h1>Panel Notifikasi Admin</h1>
    <span id="clock">—</span>
  </div>

  <!-- Kiri: Form kirim -->
  <div class="card">
    <div class="card-title">Kirim Pesan</div>

    <label>Target penerima</label>
    <select id="target">
      <option value="semua">@semua — semua user</option>
      <option value="personal">Personal — username tertentu</option>
    </select>

    <div id="usernameWrap" style="display:none;">
      <label>Username (bagian sebelum @gmail.com)</label>
      <input id="username" type="text" placeholder="contoh: nadya22" />
    </div>

    <label>Pesan</label>
    <textarea id="msgText" placeholder="Tulis pesan notifikasi..."></textarea>

    <div class="btn-row">
      <button class="btn btn-send" onclick="kirimPesan()">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
        Kirim Sekarang
      </button>
      <button class="btn btn-hapus" onclick="hapusPesan()">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        Hapus Popup
      </button>
    </div>

    <div id="statusBar" class="status-bar"></div>
  </div>

  <!-- Kanan: History -->
  <div class="card history-panel">
    <div class="history-header">
      <div class="history-title">Riwayat Pengiriman</div>
      <button class="clear-btn" onclick="clearHistory()">Hapus riwayat</button>
    </div>

    <div class="stat-row">
      <div class="stat">
        <div class="stat-num blue" id="statTotal">0</div>
        <div class="stat-lbl">TOTAL</div>
      </div>
      <div class="stat">
        <div class="stat-num green" id="statOk">0</div>
        <div class="stat-lbl">SUKSES</div>
      </div>
      <div class="stat">
        <div class="stat-num red" id="statFail">0</div>
        <div class="stat-lbl">GAGAL</div>
      </div>
    </div>

    <div class="history-list" id="historyList">
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        Belum ada riwayat pengiriman
      </div>
    </div>
  </div>
</div>

<script>
const DB_URL = "https://famss-75ca3-default-rtdb.asia-southeast1.firebasedatabase.app";
const HISTORY_KEY = "notif_history";

// clock
setInterval(() => {
  document.getElementById("clock").textContent = new Date().toLocaleString("id-ID", {
    day:"2-digit", month:"short", year:"numeric",
    hour:"2-digit", minute:"2-digit", second:"2-digit"
  });
}, 1000);

document.getElementById("target").addEventListener("change", function() {
  document.getElementById("usernameWrap").style.display = this.value === "personal" ? "block" : "none";
});

// --- History helpers ---
function getHistory() {
  return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
}
function saveHistory(list) {
  localStorage.setItem(HISTORY_KEY, JSON.stringify(list.slice(0, 100)));
}
function addHistory(item) {
  const list = getHistory();
  list.unshift(item);
  saveHistory(list);
  renderHistory();
}
function clearHistory() {
  if (!confirm("Hapus semua riwayat?")) return;
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
}

function renderHistory() {
  const list = getHistory();
  const el = document.getElementById("historyList");

  // update stats
  const total = list.length;
  const ok = list.filter(i => i.status === "ok").length;
  const fail = list.filter(i => i.status === "fail").length;
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statOk").textContent = ok;
  document.getElementById("statFail").textContent = fail;

  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div>Belum ada riwayat pengiriman</div>`;
    return;
  }

  el.innerHTML = list.map(item => {
    const isHapus = item.type === "hapus";
    const badgeType = isHapus ? `<span class="hi-badge badge-hapus">HAPUS</span>` : `<span class="hi-badge badge-send">KIRIM</span>`;
    const badgeStatus = item.status === "ok"
      ? `<span class="hi-badge badge-ok">✓ SUKSES</span>`
      : `<span class="hi-badge badge-fail">✗ GAGAL</span>`;
    const targetLabel = isHapus ? "—" : (item.target === "semua" ? "@semua" : `@${item.target}`);

    return `
      <div class="history-item">
        <div class="hi-top">
          ${badgeType}
          ${badgeStatus}
          <span class="hi-time">${item.time}</span>
        </div>
        ${!isHapus ? `<div class="hi-target">Target: <span>${targetLabel}</span></div>` : ""}
        <div class="hi-msg ${isHapus ? 'hapus-msg' : ''}">${isHapus ? "Popup dihapus dari semua user" : escHtml(item.msg)}</div>
        ${item.error ? `<div style="font-size:11px;color:var(--red);margin-top:5px;font-family:var(--mono);">Error: ${escHtml(item.error)}</div>` : ""}
      </div>`;
  }).join("");
}

function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function nowStr() {
  return new Date().toLocaleString("id-ID", {
    day:"2-digit", month:"short", year:"numeric",
    hour:"2-digit", minute:"2-digit", second:"2-digit"
  });
}

// --- Kirim pesan ---
async function kirimPesan() {
  const target = document.getElementById("target").value;
  const username = document.getElementById("username").value.trim().toLowerCase();
  const text = document.getElementById("msgText").value.trim();

  if (!text) { showStatus("Pesan tidak boleh kosong!", false); return; }
  if (target === "personal" && !username) { showStatus("Username harus diisi!", false); return; }

  const finalText = target === "semua" ? `@semua ${text}` : `@${username} ${text}`;
  const msgId = Date.now();

  showStatus("Mengirim...", null);

  try {
    const res = await fetch(`${DB_URL}/messages/latest.json`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        text: finalText,
        username: target === "semua" ? "semua" : username,
        msgId, deleted: false
      })
    });

    if (res.ok) {
      showStatus(`✅ Pesan terkirim ke ${target === "semua" ? "semua user" : "@" + username}`, true);
      addHistory({ type:"kirim", target: target === "semua" ? "semua" : username, msg: text, status:"ok", time: nowStr() });
      document.getElementById("msgText").value = "";
    } else {
      const errText = await res.text();
      showStatus("❌ Gagal kirim. Cek Rules Firebase.", false);
      addHistory({ type:"kirim", target: target === "semua" ? "semua" : username, msg: text, status:"fail", time: nowStr(), error: `HTTP ${res.status}` });
    }
  } catch(e) {
    showStatus("❌ Error: " + e.message, false);
    addHistory({ type:"kirim", target: target === "semua" ? "semua" : username, msg: text, status:"fail", time: nowStr(), error: e.message });
  }
}

// --- Hapus popup ---
async function hapusPesan() {
  showStatus("Menghapus...", null);
  try {
    const res = await fetch(`${DB_URL}/messages/latest.json`);
    const data = await res.json();

    if (!data) { showStatus("Tidak ada pesan aktif.", false); return; }

    const res2 = await fetch(`${DB_URL}/messages/latest.json`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ...data, deleted: true })
    });

    if (res2.ok) {
      showStatus("✅ Popup berhasil dihapus dari semua user.", true);
      addHistory({ type:"hapus", status:"ok", time: nowStr() });
    } else {
      showStatus("❌ Gagal hapus.", false);
      addHistory({ type:"hapus", status:"fail", time: nowStr(), error: `HTTP ${res2.status}` });
    }
  } catch(e) {
    showStatus("❌ Error: " + e.message, false);
    addHistory({ type:"hapus", status:"fail", time: nowStr(), error: e.message });
  }
}

function showStatus(msg, ok) {
  const el = document.getElementById("statusBar");
  el.textContent = msg;
  if (ok === null) { el.className = "status-bar"; el.style.display = "block"; el.style.background = "var(--surface2)"; el.style.color = "var(--muted)"; el.style.border = "1px solid var(--border)"; }
  else { el.style.background = ""; el.style.color = ""; el.style.border = ""; el.className = "status-bar " + (ok ? "ok" : "err"); }
}

// init
renderHistory();
</script>
</body>
</html>
